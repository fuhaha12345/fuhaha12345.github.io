baseURL = 'https://fuhaha12345.github.io/'
locale = 'zh-CN'
defaultContentLanguage = 'zh-cn'
title = 'Web3 Security Research'
theme = 'PaperMod'
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  description = 'Solidity 漏洞分析、DeFi 安全研究笔记。'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  mainSections = ['posts']

[params.homeInfoParams]
  Title = 'Web3 Security Research'
  Content = '专注 Solidity 漏洞分析、DeFi 安全研究与 EVM 学习记录。'

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/fuhaha12345'

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ['title', 'permalink', 'summary', 'content']

[[menu.main]]
  identifier = 'vulnerabilities'
  name = '漏洞分析'
  url = '/categories/漏洞分析/'
  weight = 10

[[menu.main]]
  identifier = 'defi'
  name = 'DeFi 安全'
  url = '/categories/DeFi 安全/'
  weight = 20
  
[[menu.main]]
identifier = 'study-notes'
name = '学习笔记'
url = '/posts/study-notes/'
weight = 35

[[menu.main]]
  identifier = 'archives'
  name = '归档'
  url = '/archives/'
  weight = 40

[[menu.main]]
  identifier = 'search'
  name = '搜索'
  url = '/search/'
  weight = 50

[[menu.main]]
  identifier = 'about'
  name = '关于'
  url = '/about/'
  weight = 60

[markup.highlight]
  noClasses = false
  lineNos = true
  lineNumbersInTable = false
  style = 'dracula'

[markup.goldmark.renderer]
  unsafe = true
